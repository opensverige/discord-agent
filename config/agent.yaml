# Discord-agent — OpenSverige
# https://github.com/opensverige/.github (agent-infra, manifesto)

# Körmiljö: Mac mini 24/7, 16 GB RAM
# Framework: nanoclaw (lättvikt) ELLER hermes (NousResearch, bättre för long-term memory)
runtime:
  host: mac-mini
  mode: 24/7
  ram_gb: 16
  # Välj ett: nanoclaw | hermes
  framework: nanoclaw
  # hermes rekommenderas om agenten ska logga/minnas vad som hänt i communityt

agent:
  name: opensverige-discord-agent
  identity: ../identity/agent.md
  memory_dir: ../memory
  tools_specs: ../tools

# Discord
discord:
  # Guild ID sätts i .env som DISCORD_GUILD_ID
  # Bot token i .env som DISCORD_BOT_TOKEN
  command_prefix: "!"   # valfritt, om ni använder text-kommandon
